<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEDS</title>

  <link rel="icon" href="/fehra-meds/favicon.ico?v=2" sizes="any">
  <link rel="shortcut icon" href="/fehra-meds/favicon.ico?v=2">
  <link rel="icon" type="image/png" href="/fehra-meds/favicon.png?v=2">
  <link rel="apple-touch-icon" href="/fehra-meds/favicon.png?v=2">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e8f8ef, #f7faf9);
      color: #12312c;
      padding: 18px;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding-bottom: 30px;
    }

    .header {
      margin-bottom: 18px;
      padding: 18px 8px 4px;
      position: relative;
    }

    .header h1 {
      margin: 0;
      font-size: 56px;
      line-height: 1;
      letter-spacing: 3px;
      color: #0b6f5c;
      font-weight: 900;
    }

    .leaf {
      position: absolute;
      right: 20px;
      top: 18px;
      font-size: 64px;
      opacity: 0.25;
    }

    .section {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 18px;
      box-shadow: 0 14px 35px rgba(23, 92, 75, 0.12);
      backdrop-filter: blur(12px);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 2px 14px;
    }

    .section-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #e1f4ea;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0b7a62;
      font-size: 18px;
      font-weight: bold;
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      color: #102c27;
    }

    .progress-wrap {
      margin-top: 14px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 800;
      color: #3f5c55;
      margin-bottom: 7px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #dfe8e5;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(135deg, #09916f, #08715b);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 13px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(15, 78, 66, 0.08);
      border: 1px solid #edf3f1;
    }

    .medicine-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .medicine-icon {
      min-width: 54px;
      height: 54px;
      border-radius: 14px;
      background: #e3f5ee;
      color: #0b7a62;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
    }

    .medicine-title {
      font-size: 19px;
      font-weight: 800;
      color: #102c27;
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .checkbox-group.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .checkbox-group.single {
      grid-template-columns: 1fr;
    }

    label {
      cursor: pointer;
      user-select: none;
    }

    input[type="checkbox"] {
      display: none;
    }

    .check-box {
      display: block;
      text-align: center;
      padding: 10px 8px;
      border-radius: 11px;
      background: #ffffff;
      color: #64706d;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid #dfe8e5;
      box-shadow: 0 3px 8px rgba(0,0,0,0.04);
      transition: 0.2s ease;
    }

    .checkbox-group.single .check-box {
      padding: 14px 8px;
      font-size: 17px;
    }

    input[type="checkbox"]:checked + .check-box {
      background: linear-gradient(135deg, #09916f, #08715b);
      color: #ffffff;
      border-color: #08715b;
      box-shadow: 0 6px 14px rgba(8, 113, 91, 0.28);
    }

    input[type="checkbox"]:checked + .check-box::before {
      content: "✓ ";
      font-weight: 900;
    }

    .reset {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 14px;
      margin-top: 4px;
      background: #fff0ef;
      color: #c01818;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .reset:active {
      transform: scale(0.98);
    }

    @media (max-width: 430px) {
      body { padding: 12px; }

      .header h1 { font-size: 48px; }

      .leaf { font-size: 52px; }

      .checkbox-group { gap: 7px; }

      .check-box {
        font-size: 14px;
        padding: 9px 5px;
      }

      .checkbox-group.single .check-box {
        font-size: 16px;
        padding: 13px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="leaf">🌿</div>
      <h1>MEDS</h1>
    </header>

    <section class="section">
      <div class="section-header">
        <div class="section-icon">✓</div>
        <h2 class="section-title">Total Progress</h2>
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span>Fehra</span>
          <span id="fehra-progress-text">0/4</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="fehra-progress-fill"></div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span>Others</span>
          <span id="other-progress-text">0/5</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="other-progress-fill"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-icon">🌿</div>
        <h2 class="section-title">Fehra</h2>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">🛡</div>
          <div class="medicine-title">Vetinmune</div>
        </div>
        <div class="checkbox-group">
          <label><input type="checkbox" id="vetinmune-morning"><span class="check-box">Morning</span></label>
          <label><input type="checkbox" id="vetinmune-day"><span class="check-box">Afternoon</span></label>
          <label><input type="checkbox" id="vetinmune-evening"><span class="check-box">Evening</span></label>
        </div>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">☤</div>
          <div class="medicine-title">Symbiotic</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="symbiotic-daily"><span class="check-box">Daily</span></label>
        </div>
      </div>

      <button class="reset" onclick="resetSection('fehra')">↻ Reset Fehra</button>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-icon">🌿</div>
        <h2 class="section-title">Others</h2>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">🩺</div>
          <div class="medicine-title">Blood pressure</div>
        </div>
        <div class="checkbox-group two">
          <label><input type="checkbox" id="bp-morning"><span class="check-box">Morning</span></label>
          <label><input type="checkbox" id="bp-evening"><span class="check-box">Evening</span></label>
        </div>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">❤️</div>
          <div class="medicine-title">Betac</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="z-daily"><span class="check-box">Daily</span></label>
        </div>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">☀️</div>
          <div class="medicine-title">Vitamin D</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="vitd-daily"><span class="check-box">Daily</span></label>
        </div>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">💊</div>
          <div class="medicine-title">Vitamin B12, Folium, Omega, Complex</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="b12-daily"><span class="check-box">Daily</span></label>
        </div>
      </div>

      <button class="reset" onclick="resetSection('other')">↻ Reset Others</button>
    </section>
  </div>

  <script>
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');

    const fehraIds = [
      'vetinmune-morning',
      'vetinmune-day',
      'vetinmune-evening',
      'symbiotic-daily'
    ];

    const otherIds = [
      'bp-morning',
      'bp-evening',
      'z-daily',
      'vitd-daily',
      'b12-daily'
    ];

    function updateProgress(ids, fillId, textId) {
      const checked = ids.filter(id => {
        const box = document.getElementById(id);
        return box && box.checked;
      }).length;

      const total = ids.length;
      const percent = total === 0 ? 0 : Math.round((checked / total) * 100);

      document.getElementById(fillId).style.width = percent + '%';
      document.getElementById(textId).textContent = checked + '/' + total;
    }

    function updateAllProgress() {
      updateProgress(fehraIds, 'fehra-progress-fill', 'fehra-progress-text');
      updateProgress(otherIds, 'other-progress-fill', 'other-progress-text');
    }

    checkboxes.forEach(box => {
      box.checked = localStorage.getItem(box.id) === 'true';

      box.addEventListener('change', () => {
        localStorage.setItem(box.id, box.checked);
        updateAllProgress();
      });
    });

    updateAllProgress();

    function resetSection(section) {
      const ids = section === 'fehra' ? fehraIds : otherIds;

      ids.forEach(id => {
        const box = document.getElementById(id);

        if (box) {
          box.checked = false;
          localStorage.setItem(id, 'false');
        }
      });

      updateAllProgress();
    }
  </script>
</body>
</html>
