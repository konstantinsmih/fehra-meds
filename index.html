<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Приём лекарств</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
    }

    input[type="checkbox"] {
      width: 26px;
      height: 26px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #d9534f;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Приём лекарств</h1>

  <div class="card">
    <input type="checkbox" id="med1">
    <label for="med1">Лекарство 1</label>
  </div>

  <div class="card">
    <input type="checkbox" id="med2">
    <label for="med2">Лекарство 2</label>
  </div>

  <div class="card">
    <input type="checkbox" id="med3">
    <label for="med3">Лекарство 3</label>
  </div>

  <button onclick="resetAll()">Сбросить отметки</button>

  <script>
    const medicines = ["med1", "med2", "med3"];

    medicines.forEach(id => {
      const checkbox = document.getElementById(id);

      checkbox.checked = localStorage.getItem(id) === "true";

      checkbox.addEventListener("change", () => {
        localStorage.setItem(id, checkbox.checked);
      });
    });

    function resetAll() {
      medicines.forEach(id => {
        localStorage.removeItem(id);
        document.getElementById(id).checked = false;
      });
    }
  </script>

</body>
</html>
