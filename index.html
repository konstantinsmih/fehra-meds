<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEDS</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e8f8ef, #f7faf9);
      color: #12312c;
      padding: 18px;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding-bottom: 30px;
    }

    .header {
      margin-bottom: 24px;
      padding: 18px 8px 4px;
      position: relative;
    }

    .header h1 {
      margin: 0;
      font-size: 56px;
      line-height: 1;
      letter-spacing: 3px;
      color: #0b6f5c;
      font-weight: 900;
    }

    .leaf {
      position: absolute;
      right: 20px;
      top: 18px;
      font-size: 64px;
      opacity: 0.25;
    }

    .section {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 18px;
      box-shadow: 0 14px 35px rgba(23, 92, 75, 0.12);
      backdrop-filter: blur(12px);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 2px 14px;
    }

    .section-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #e1f4ea;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0b7a62;
      font-size: 18px;
      font-weight: bold;
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      color: #102c27;
    }

    .days-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .day-box {
      display: block;
      height: 46px;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #dfe8e5;
      box-shadow: 0 3px 8px rgba(0,0,0,0.04);
      transition: 0.2s ease;
      position: relative;
    }

    input[type="checkbox"]:checked + .day-box {
      background: linear-gradient(135deg, #09916f, #08715b);
      border-color: #08715b;
      box-shadow: 0 6px 14px rgba(8,113,91,0.28);
    }

    input[type="checkbox"]:checked + .day-box::after {
      content: "✓";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 22px;
      font-weight: 900;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 13px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(15, 78, 66, 0.08);
      border: 1px solid #edf3f1;
    }

    .medicine-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .medicine-icon {
      min-width: 54px;
      height: 54px;
      border-radius: 14px;
      background: #e3f5ee;
      color: #0b7a62;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
    }

    .medicine-title {
      font-size: 19px;
      font-weight: 800;
      color: #102c27;
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .checkbox-group.single {
      grid-template-columns: 1fr;
    }

    label {
      cursor: pointer;
      user-select: none;
    }

    input[type="checkbox"] {
      display: none;
    }

    .check-box {
      display: block;
      text-align: center;
      padding: 10px 8px;
      border-radius: 11px;
      background: #ffffff;
      color: #64706d;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid #dfe8e5;
      box-shadow: 0 3px 8px rgba(0,0,0,0.04);
      transition: 0.2s ease;
    }

    .checkbox-group.single .check-box {
      padding: 14px 8px;
      font-size: 17px;
    }

    input[type="checkbox"]:checked + .check-box {
      background: linear-gradient(135deg, #09916f, #08715b);
      color: #ffffff;
      border-color: #08715b;
      box-shadow: 0 6px 14px rgba(8, 113, 91, 0.28);
    }

    input[type="checkbox"]:checked + .check-box::before {
      content: "✓ ";
      font-weight: 900;
    }

    .reset {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 14px;
      margin-top: 4px;
      background: #fff0ef;
      color: #c01818;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .reset:active {
      transform: scale(0.98);
    }

    @media (max-width: 430px) {
      body { padding: 12px; }

      .header h1 { font-size: 48px; }

      .leaf { font-size: 52px; }

      .checkbox-group { gap: 7px; }

      .check-box {
        font-size: 14px;
        padding: 9px 5px;
      }

      .checkbox-group.single .check-box {
        font-size: 16px;
        padding: 13px 8px;
      }

      .day-box {
        height: 42px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="leaf">🌿</div>
      <h1>MEDS</h1>
    </header>

    <section class="section">
      <div class="section-header">
        <div class="section-icon">📅</div>
        <h2 class="section-title">Days</h2>
      </div>

      <div class="days-row">
        <label><input type="checkbox" id="day1"><span class="day-box"></span></label>
        <label><input type="checkbox" id="day2"><span class="day-box"></span></label>
        <label><input type="checkbox" id="day3"><span class="day-box"></span></label>
        <label><input type="checkbox" id="day4"><span class="day-box"></span></label>
        <label><input type="checkbox" id="day5"><span class="day-box"></span></label>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-icon">🌿</div>
        <h2 class="section-title">Fehra</h2>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">🛡</div>
          <div class="medicine-title">Vetimune</div>
        </div>
        <div class="checkbox-group">
          <label><input type="checkbox" id="vetimune-morning"><span class="check-box">Утро</span></label>
          <label><input type="checkbox" id="vetimune-day"><span class="check-box">День</span></label>
          <label><input type="checkbox" id="vetimune-evening"><span class="check-box">Вечер</span></label>
        </div>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">⚡</div>
          <div class="medicine-title">Da Forte</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="daforte-daily"><span class="check-box">Суточно</span></label>
        </div>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">☤</div>
          <div class="medicine-title">Symbiotic</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="symbiotic-daily"><span class="check-box">Суточно</span></label>
        </div>
      </div>

      <button class="reset" onclick="resetSection('fehra')">↻ Reset Fehra</button>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-icon">🌿</div>
        <h2 class="section-title">Other</h2>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">🩺</div>
          <div class="medicine-title">Perindopril</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="z-daily"><span class="check-box">Суточно</span></label>
        </div>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">💊</div>
          <div class="medicine-title">B12</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="b12-daily"><span class="check-box">Суточно</span></label>
        </div>
      </div>

      <div class="card">
        <div class="medicine-row">
          <div class="medicine-icon">🍃</div>
          <div class="medicine-title">Folium</div>
        </div>
        <div class="checkbox-group single">
          <label><input type="checkbox" id="folium-daily"><span class="check-box">Суточно</span></label>
        </div>
      </div>

      <button class="reset" onclick="resetSection('other')">↻ Reset Other</button>
    </section>
  </div>

  <script>
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');

    checkboxes.forEach(box => {
      box.checked = localStorage.getItem(box.id) === 'true';

      box.addEventListener('change', () => {
        localStorage.setItem(box.id, box.checked);
      });
    });

    function resetSection(section) {
      const fehra = [
        'vetimune-morning',
        'vetimune-day',
        'vetimune-evening',
        'daforte-daily',
        'symbiotic-daily'
      ];

      const other = [
        'z-daily',
        'b12-daily',
        'folium-daily'
      ];

      const ids = section === 'fehra' ? fehra : other;

      ids.forEach(id => {
        const box = document.getElementById(id);

        if (box) {
          box.checked = false;
          localStorage.setItem(id, 'false');
        }
      });
    }
  </script>
</body>
</html>
